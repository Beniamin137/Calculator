<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#090909;margin:0;padding:0;}
    #gapp{font-family:'Inter',sans-serif;background:#090909;color:#d4d0c8;min-height:100vh;width:100%;max-width:100%;margin:0 auto;padding-bottom:80px;font-size:14px;line-height:1.5;}

    .hdr{background:linear-gradient(135deg,#1a1a1a 0%,#222 100%);padding:24px 20px 18px;position:relative;overflow:hidden;border-bottom:1px solid #1f1f1f;}
    .hdr::after{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.03);pointer-events:none;}
    .hdr h1{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:2px;position:relative;text-transform:uppercase;}
    .hdr-sub{font-size:12px;color:#444;margin-top:3px;position:relative;font-weight:400;}
    .badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;position:relative;}
    .badge{background:#161616;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:500;color:#555;border:1px solid #222;}

    .tabs{display:flex;background:#0f0f0f;border-bottom:1px solid #1a1a1a;position:sticky;top:0;z-index:10;overflow-x:auto;}
    .tabs::-webkit-scrollbar{display:none;}
    .tb{flex:1;min-width:60px;padding:12px 4px;background:none;border:none;color:#444;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:color .2s;position:relative;white-space:nowrap;}
    .tb.active{color:#e0dcd4;}
    .tb.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;background:#e0dcd4;}

    .content{padding:14px;}
    .card{background:#111;border:1px solid #1c1c1c;border-radius:14px;padding:18px;margin-bottom:12px;}
    .card-title{font-size:14px;font-weight:600;color:#ccc;margin-bottom:16px;}

    .field{margin-bottom:12px;}
    .field label{display:block;font-size:11px;font-weight:500;color:#555;margin-bottom:5px;}
    input[type=text],input[type=date],input[type=number],textarea,select{width:100%;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:8px;color:#d4d0c8;font-family:'Inter',sans-serif;font-size:14px;font-weight:400;padding:10px 13px;transition:border-color .2s;outline:none;box-sizing:border-box;appearance:none;-webkit-appearance:none;}
    input:focus,textarea:focus,select:focus{border-color:#555;}
    textarea{resize:vertical;min-height:52px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

    .notice{display:flex;align-items:flex-start;gap:8px;background:#111;border:1px solid #222;border-radius:8px;padding:10px 13px;margin-bottom:12px;font-size:12px;font-weight:400;color:#555;}

    .preview{background:#0a0a0a;border:1px solid #1c1c1c;border-radius:9px;padding:13px;margin-bottom:12px;}
    .pr{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:#444;border-bottom:1px solid #161616;}
    .pr:last-child{border-bottom:none;}
    .pr.hl{color:#ccc;font-size:15px;font-weight:600;padding-top:9px;margin-top:3px;}
    .pr span:first-child{font-weight:400;}
    .pr span:last-child{font-weight:600;}

    .btn{width:100%;padding:12px;border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
    .btn-or{background:linear-gradient(135deg,#c44e00,#e87e00);color:#fff;}
    .btn-bl{background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;}
    .btn-gr{background:linear-gradient(135deg,#166534,#16a34a);color:#fff;}
    .btn-gh{background:transparent;border:1px solid #1e1e1e;color:#444;margin-top:8px;}
    .btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:7px;}

    .toast{text-align:center;padding:9px;border-radius:8px;font-weight:600;font-size:12px;margin-top:10px;}

    .breadcrumb{display:flex;align-items:center;gap:5px;margin-bottom:12px;font-size:12px;color:#444;flex-wrap:wrap;}
    .bc-btn{background:none;border:none;color:#888;font-size:12px;font-weight:500;cursor:pointer;padding:0;font-family:'Inter',sans-serif;}
    .bc-btn:hover{color:#ccc;}
    .bc-sep{color:#2a2a2a;}

    .month-row{display:flex;align-items:center;justify-content:space-between;background:#111;border:1px solid #1c1c1c;border-radius:11px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:background .15s;}
    .month-row:hover{background:#151515;}
    .month-row-name{font-size:14px;font-weight:600;color:#ccc;}
    .month-row-sub{font-size:11px;font-weight:400;color:#3a3a3a;margin-top:2px;}
    .month-row-right{text-align:right;flex-shrink:0;margin-left:10px;}
    .month-row-net{font-size:17px;font-weight:700;color:#4ade80;}
    .month-row-meta{font-size:11px;font-weight:400;color:#333;margin-top:2px;}

    .week-row{display:flex;align-items:center;justify-content:space-between;background:#111;border:1px solid #1c1c1c;border-radius:10px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:background .15s;}
    .week-row:hover{background:#151515;}
    .week-row-label{font-size:13px;font-weight:600;color:#999;}
    .week-row-sub{font-size:11px;font-weight:400;color:#333;margin-top:2px;}
    .week-row-right{text-align:right;flex-shrink:0;margin-left:10px;}
    .week-row-net{font-size:15px;font-weight:700;color:#4ade80;}
    .week-row-meta{font-size:11px;font-weight:400;color:#333;margin-top:2px;}

    .day-card{background:#0d0d0d;border:1px solid #191919;border-radius:10px;padding:13px;margin-bottom:8px;}
    .day-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .day-title{font-size:13px;font-weight:600;color:#ccc;}
    .day-sub{font-size:11px;font-weight:400;color:#333;margin-top:2px;}
    .day-actions{display:flex;gap:5px;flex-shrink:0;}
    .ic{background:#161616;border:1px solid #202020;border-radius:6px;color:#3a3a3a;padding:5px 9px;font-size:12px;cursor:pointer;transition:all .15s;}
    .ic:hover{color:#bbb;background:#1e1e1e;}
    .ic.red:hover{background:#200d0d;border-color:#331414;color:#f87171;}

    .sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .sb{background:#111;border-radius:7px;padding:8px 10px;}
    .sb.g{background:rgba(74,222,128,.04);}
    .sb.o{background:rgba(255,120,0,.04);}
    .sb.r{background:rgba(248,113,113,.04);}
    .sl{font-size:10px;font-weight:500;color:#383838;margin-bottom:3px;}
    .sv{font-size:14px;font-weight:600;color:#888;}
    .sv.green{color:#4ade80;}
    .sv.orange{color:#e87e00;}
    .sv.red{color:#f87171;}
    .sv.blue{color:#0ea5e9;}

    .day-note{margin-top:9px;font-size:12px;font-weight:400;color:#666;line-height:1.6;padding:9px 11px;background:#111;border-radius:7px;border-left:2px solid #222;}

    .week-summary{background:#0a0a0a;border:1px solid #181818;border-radius:10px;padding:13px 15px;margin-bottom:11px;}
    .ws-title{font-size:12px;font-weight:600;color:#555;margin-bottom:9px;}
    .ws-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
    .ws-item{font-size:12px;font-weight:400;color:#444;}
    .ws-item b{font-weight:600;color:#666;}
    .ws-item.green b{color:#4ade80;}
    .ws-item.orange b{color:#e87e00;}
    .ws-item.red b{color:#f87171;}

    .empty{text-align:center;color:#252525;padding:50px 20px;font-size:13px;line-height:2;}
    .empty-icon{font-size:36px;display:block;margin-bottom:10px;}

    .profit-card{border-radius:14px;padding:20px;margin-bottom:12px;text-align:center;}
    .profit-card.g{background:#0a160d;border:1px solid rgba(74,222,128,.12);}
    .profit-card.r{background:#160a0a;border:1px solid rgba(248,113,113,.12);}
    .pc-lbl{font-size:11px;font-weight:500;color:#444;margin-bottom:7px;letter-spacing:.5px;}
    .pc-val{font-size:40px;font-weight:700;line-height:1;}
    .pc-val.g{color:#4ade80;}.pc-val.r{color:#f87171;}
    .pc-sub{font-size:12px;font-weight:400;color:#3a3a3a;margin-top:7px;line-height:1.5;}

    .sum-card{background:#111;border:1px solid #1c1c1c;border-radius:14px;padding:18px;margin-bottom:12px;}
    .sc-lbl{font-size:11px;font-weight:500;color:#444;margin-bottom:4px;letter-spacing:.3px;}
    .sc-val{font-size:28px;font-weight:700;}
    .sc-val.g{color:#4ade80;}.sc-val.b{color:#0ea5e9;}.sc-val.o{color:#e87e00;}.sc-val.r{color:#f87171;}
    .sc-val span{font-size:14px;color:#2a2a2a;font-weight:400;margin-left:3px;}
    .sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;}
    .sc-item{background:#0a0a0a;border-radius:8px;padding:9px 11px;}
    .sc-il{font-size:10px;font-weight:500;color:#333;margin-bottom:3px;}
    .sc-iv{font-size:14px;font-weight:600;color:#777;}
    .sec-title{font-size:11px;font-weight:500;color:#333;letter-spacing:.5px;margin:16px 0 9px;text-transform:uppercase;}

    /* FIRM SELECTOR */
    .firm-sel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
    .firm-btn{padding:12px 6px 10px;border-radius:10px;border:2px solid #1e1e1e;background:#0a0a0a;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;}
    .firm-btn:hover{background:#111;}
    .firm-btn.glovo-active{border-color:#F5B60A;background:rgba(245,182,10,0.06);}
    .firm-btn.wolt-active{border-color:#00C2E0;background:rgba(0,194,224,0.06);}
    .firm-btn.bolt-active{border-color:#34D058;background:rgba(52,208,88,0.06);}
    .firm-logo-wrap{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .firm-name-lbl{font-size:11px;font-weight:600;color:#555;transition:color .2s;}
    .firm-btn.glovo-active .firm-name-lbl{color:#F5B60A;}
    .firm-btn.wolt-active .firm-name-lbl{color:#00C2E0;}
    .firm-btn.bolt-active .firm-name-lbl{color:#34D058;}

    /* FIRM BADGE (inline) */
    .firm-badge{display:inline-flex;align-items:center;gap:5px;border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;}
    .firm-badge img{width:14px;height:14px;border-radius:3px;object-fit:contain;}

    /* TOGGLE */
    .toggle-row{display:flex;align-items:center;justify-content:space-between;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:8px;padding:10px 13px;margin-bottom:12px;cursor:pointer;}
    .toggle-row span{font-size:13px;font-weight:400;color:#888;}
    .toggle-switch{width:38px;height:20px;background:#1e1e1e;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0;}
    .toggle-switch.on{background:#16a34a;}
    .toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
    .toggle-switch.on::after{left:20px;}

    /* SERVICE */
    .service-item-row{display:flex;gap:7px;align-items:center;margin-bottom:8px;}
    .service-item-row input{flex:1;}
    .del-item-btn{background:#161616;border:1px solid #1e1e1e;border-radius:7px;color:#3a3a3a;padding:8px 10px;cursor:pointer;font-size:13px;flex-shrink:0;transition:all .15s;}
    .del-item-btn:hover{color:#f87171;border-color:#331414;}
    .service-record{background:#0d0d0d;border:1px solid #191919;border-radius:10px;padding:13px;margin-bottom:8px;}
    .srv-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
    .srv-title{font-size:13px;font-weight:600;color:#ccc;}
    .srv-sub{font-size:11px;color:#333;margin-top:2px;}
    .srv-items{margin-top:8px;}
    .srv-item{display:flex;justify-content:space-between;font-size:12px;color:#555;padding:3px 0;border-bottom:1px dashed #161616;}
    .srv-item:last-child{border-bottom:none;}
    .srv-total{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#ccc;margin-top:8px;padding-top:8px;border-top:1px solid #1e1e1e;}

    .cui{display:inline-flex;align-items:center;gap:6px;background:#111;border:1px solid #1c1c1c;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:500;color:#0ea5e9;margin-bottom:12px;}

    .chart-wrap{background:#0a0a0a;border:1px solid #191919;border-radius:12px;padding:16px;margin-bottom:12px;overflow:hidden;}
    .chart-title{font-size:12px;font-weight:500;color:#444;margin-bottom:14px;}
    .bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
    .bar-val{font-size:9px;color:#333;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}
    .bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s;}
    .bar-lbl{font-size:9px;color:#333;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal-box{background:#141414;border:1px solid #222;border-radius:13px;padding:22px;max-width:300px;width:100%;text-align:center;}
    .modal-box p{font-size:13px;font-weight:400;color:#888;line-height:1.6;margin-bottom:18px;}
  </style>
</head>
<body>
<div id="gapp">
  <div class="hdr">
    <h1>Calculator</h1>
    <div class="hdr-sub">Venituri · Carburant · Service</div>
    <div class="badges">
      <span class="badge">Carte muncă 220 RON/săpt</span>
      <span class="badge">Șef 10% (obligatoriu)</span>
      <span class="badge">Concediu disponibil</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tb active" id="tab-add" onclick="switchTab('add')">+ Adaugă</button>
    <button class="tb" id="tab-history" onclick="switchTab('history')">Istoric</button>
    <button class="tb" id="tab-fuel" onclick="switchTab('fuel')">Carburant</button>
    <button class="tb" id="tab-service" onclick="switchTab('service')">Service</button>
    <button class="tb" id="tab-stats" onclick="switchTab('stats')">Sumar</button>
  </div>
  <div class="content" id="main-content"></div>
  <div id="confirm-modal" style="display:none;" class="modal-overlay">
    <div class="modal-box">
      <div style="font-size:26px;margin-bottom:8px">🗑️</div>
      <p id="confirm-msg"></p>
      <div style="display:flex;gap:8px;">
        <button onclick="cancelDelete()" style="flex:1;padding:10px;background:#1a1a1a;border:1px solid #252525;border-radius:7px;color:#555;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;cursor:pointer;">Anulează</button>
        <button onclick="doDelete()" style="flex:1;padding:10px;background:#dc2626;border:none;border-radius:7px;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;cursor:pointer;">Șterge</button>
      </div>
    </div>
  </div>
</div>
<script>
if(!window.storage){
  window.storage={
    get:async(k)=>({value:localStorage.getItem(k)}),
    set:async(k,v)=>localStorage.setItem(k,v)
  };
}

const CARTE_MUNCA=220, FUEL_RATE=0.05, CUI="RO49730377";
const SEF_PCT=0.10;

// SVG logos inline
const LOGOS={
  glovo:`<svg viewBox="0 0 40 40" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
    <rect width="40" height="40" rx="8" fill="#F5B60A"/>
    <text x="20" y="27" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="18" fill="#1a1200">G</text>
  </svg>`,
  wolt:`<svg viewBox="0 0 40 40" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
    <rect width="40" height="40" rx="8" fill="#009DE0"/>
    <text x="20" y="27" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="18" fill="#ffffff">W</text>
  </svg>`,
  bolt:`<svg viewBox="0 0 40 40" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
    <rect width="40" height="40" rx="8" fill="#34D058"/>
    <text x="20" y="27" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="18" fill="#0a2010">B</text>
  </svg>`
};

const LOGO_SM={
  glovo:`<svg viewBox="0 0 20 20" width="14" height="14" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="4" fill="#F5B60A"/><text x="10" y="14" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="11" fill="#1a1200">G</text></svg>`,
  wolt:`<svg viewBox="0 0 20 20" width="14" height="14" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="4" fill="#009DE0"/><text x="10" y="14" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="11" fill="#fff">W</text></svg>`,
  bolt:`<svg viewBox="0 0 20 20" width="14" height="14" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="4" fill="#34D058"/><text x="10" y="14" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="11" fill="#0a2010">B</text></svg>`
};

const FIRMS={
  glovo:{name:'Glovo',color:'#F5B60A',bg:'rgba(245,182,10,0.08)',border:'rgba(245,182,10,0.2)'},
  wolt:{name:'Wolt',color:'#009DE0',bg:'rgba(0,157,224,0.08)',border:'rgba(0,157,224,0.2)'},
  bolt:{name:'Bolt',color:'#34D058',bg:'rgba(52,208,88,0.08)',border:'rgba(52,208,88,0.2)'}
};

let days=[],fuels=[],serviceRecs=[],currentTab='add',histNav=null;
let editDayId=null,editFuelId=null,editSrvId=null,pendingDelete=null;
let addFirm='glovo';
let srvItems=[{name:'',pret:''}];

function fmt(n,dec=2){return Number(n).toLocaleString('ro-RO',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function fmtInt(n){return Number(n).toLocaleString('ro-RO');}

async function loadData(){
  try{const r=await window.storage.get('calc_days');if(r&&r.value)days=JSON.parse(r.value);}catch(e){days=[];}
  try{const r=await window.storage.get('calc_fuels');if(r&&r.value)fuels=JSON.parse(r.value);}catch(e){fuels=[];}
  try{const r=await window.storage.get('calc_service');if(r&&r.value)serviceRecs=JSON.parse(r.value);}catch(e){serviceRecs=[];}
  if(!days.length){try{const r=await window.storage.get('glovo_days');if(r&&r.value){days=JSON.parse(r.value);saveDays();}}catch(e){}}
  if(!fuels.length){try{const r=await window.storage.get('glovo_fuels');if(r&&r.value){fuels=JSON.parse(r.value);saveFuels();}}catch(e){}}
  render();
}
async function saveDays(){try{await window.storage.set('calc_days',JSON.stringify(days));}catch(e){}}
async function saveFuels(){try{await window.storage.set('calc_fuels',JSON.stringify(fuels));}catch(e){}}
async function saveSrv(){try{await window.storage.set('calc_service',JSON.stringify(serviceRecs));}catch(e){}}

function today(){return new Date().toISOString().slice(0,10);}
function getMonthKey(d){return d?d.slice(0,7):'unknown';}
function getWeekKey(dateStr){
  if(!dateStr)return 'unknown';
  const d=new Date(dateStr),day=d.getDay()===0?7:d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-day+1);
  return mon.toISOString().slice(0,10);
}
function weekLabel(wk){
  const mon=new Date(wk),sun=new Date(wk);sun.setDate(mon.getDate()+6);
  const f=d=>d.toLocaleDateString('ro-RO',{day:'numeric',month:'short'});
  return f(mon)+' – '+f(sun);
}
function monthLabel(mk){
  const[y,m]=mk.split('-');
  return new Date(+y,+m-1,1).toLocaleDateString('ro-RO',{month:'long',year:'numeric'});
}
function dayLabel(ds){return new Date(ds).toLocaleDateString('ro-RO',{weekday:'long',day:'numeric',month:'long'});}

function calcDay(d){
  const c=parseFloat(d.comenzi)||0,b=parseFloat(d.bonusuri)||0,total=c+b;
  return{comenzi:c,bonusuri:b,total,sef:0,net:total};
}
// Calculate a week's net: if ANY day in week has cu_sef, apply 10% on full week brut, then subtract 220 CM
function calcWeek(wDays){
  const brut=wDays.reduce((a,d)=>a+calcDay(d).total,0);
  const hasSef=wDays.some(d=>d.cu_sef===true||d.cu_sef==='true');
  const sef=hasSef?brut*SEF_PCT:0;
  const net=brut-sef-CARTE_MUNCA;
  return{brut,hasSef,sef,net};
}
function calcFuel(f){
  const l=parseFloat(f.litri)||0,p=parseFloat(f.pret_litru)||0,total=l*p;
  const firma=f.pe_firma===true||f.pe_firma==='true';
  const dec=firma?total*FUEL_RATE:0;
  return{litri:l,pret:p,total,decontare:dec,net:total-dec,pe_firma:firma};
}
function calcSrv(s){return(s.items||[]).reduce((a,i)=>a+(parseFloat(i.pret)||0),0);}

function groupDays(){
  const r={};
  days.forEach(d=>{const mk=getMonthKey(d.data),wk=getWeekKey(d.data);if(!r[mk])r[mk]={};if(!r[mk][wk])r[mk][wk]=[];r[mk][wk].push(d);});
  return r;
}
function getFuelMonths(){
  const fm={};
  fuels.forEach(f=>{const mk=getMonthKey(f.data);if(!fm[mk])fm[mk]=[];fm[mk].push(f);});
  return fm;
}
function getSrvMonths(){
  const sm={};
  serviceRecs.forEach(s=>{const mk=getMonthKey(s.data);if(!sm[mk])sm[mk]=[];sm[mk].push(s);});
  return sm;
}

// dominant firm color for a list of days
function dominantFirm(dayList){
  const cnt={glovo:0,wolt:0,bolt:0};
  dayList.forEach(d=>cnt[d.firma||'glovo']++);
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
}

function switchTab(t){
  currentTab=t;
  if(t==='history')histNav=null;
  ['add','history','fuel','service','stats'].forEach(x=>{
    const el=document.getElementById('tab-'+x);
    if(el)el.className='tb'+(x===t?' active':'');
  });
  render();
}

function render(){
  const c=document.getElementById('main-content');
  if(!c)return;
  if(currentTab==='add')renderAdd();
  else if(currentTab==='history')c.innerHTML=renderHistory();
  else if(currentTab==='fuel')renderFuel();
  else if(currentTab==='service')renderService();
  else if(currentTab==='stats')c.innerHTML=renderStats();
}

function submitDay(){
  const data=document.getElementById('f-data').value;
  const comenzi=document.getElementById('f-comenzi').value;
  const ore=document.getElementById('f-ore').value;
  const bonusuri=document.getElementById('f-bonusuri').value;

  const cu_sef=getSef();
  if(!comenzi)return;
  if(editDayId!==null){days=days.map(d=>d.id===editDayId?{id:editDayId,data,comenzi,ore,bonusuri,nota,firma,cu_sef}:d);editDayId=null;}

function renderHistory(){
  const grouped=groupDays();
  const monthKeys=Object.keys(grouped).sort().reverse();

      const mW=grouped[mk],mDays=Object.values(mW).flat();

      const wc=Object.keys(mW).length;
      // week-level: each week calc its own sef+CM
      const allWeekNets=Object.values(mW).reduce((a,wD)=>a+calcWeek(wD).net,0);
      const net=allWeekNets;
      const totalSef=Object.values(mW).reduce((a,wD)=>a+calcWeek(wD).sef,0);
      const cm=wc*CARTE_MUNCA;

        </div>

        <span style="color:#2a2a2a;font-size:14px;margin-left:8px">›</span>
      </div>`;

  if(typeof histNav==='string'){

    const brut=mDays.reduce((a,d)=>a+calcDay(d).total,0);
    const cm=wKeys.length*CARTE_MUNCA;
    const net=Object.values(mW).reduce((a,wD)=>a+calcWeek(wD).net,0);

        <div class="ws-grid">
          <div class="ws-item">Brut: <b>${fmt(brut)} RON</b></div>
          <div class="ws-item orange">Carte muncă: <b>-${cm} RON</b></div>
          ${totalSef>0?`<div class="ws-item red">Șef 10% (săpt cu sold): <b>-${fmt(totalSef)} RON</b></div>`:'<div class="ws-item" style="color:#333">Nicio săpt cu sold</div>'}
          <div class="ws-item green">Net rămas: <b>${fmt(net)} RON</b></div>
        </div>
      </div>
      ${wKeys.map(wk=>{
        const wD=mW[wk].slice().sort((a,b)=>a.data.localeCompare(b.data));
        const {brut:wB,sef:wSef,net:wN,hasSef:wHasSef}=calcWeek(wD);
        const wO=wD.reduce((a,d)=>a+(parseFloat(d.ore)||0),0);
        const wDom=dominantFirm(wD),wfc=FIRMS[wDom];
        return`<div class="week-row" style="border-left:3px solid ${wfc.color}40" onclick="navToWeek('${mk}','${wk}')">
          <div>
            <div class="week-row-label" style="display:flex;align-items:center;gap:6px">${LOGO_SM[wDom]} ${weekLabel(wk)}</div>

          <div class="week-row-right">

          </div>
          <span style="color:#2a2a2a;font-size:14px;margin-left:8px">›</span>
        </div>`;
      }).join('')}`;
  }

  if(histNav&&histNav.mk){
    const{mk,wk}=histNav,g2=groupDays();
    const wD=((g2[mk]||{})[wk]||[]).slice().sort((a,b)=>a.data.localeCompare(b.data));
    const {brut:wB,sef:wSef,net:wN,hasSef:wHasSef}=calcWeek(wD);
    const wO=wD.reduce((a,d)=>a+(parseFloat(d.ore)||0),0);
    const wDom=dominantFirm(wD),wfc=FIRMS[wDom];
    return`
      <div class="breadcrumb">
        <button class="bc-btn" onclick="navToMonths()">Istoric</button>

      <div class="week-summary" style="border-left:3px solid ${wfc.color}50">
        <div class="ws-title" style="display:flex;align-items:center;gap:6px">${LOGO_SM[wDom]} Rezumat săptămână</div>
        <div class="ws-grid">
          <div class="ws-item">Brut: <b>${fmt(wB)} RON</b></div>
          ${wHasSef?`<div class="ws-item red">Șef 10% (sold): <b>-${fmt(wSef)} RON</b></div>`:`<div class="ws-item" style="color:#333">Fără sold (no 10%)</div>`}
          <div class="ws-item orange">Carte muncă: <b>-${CARTE_MUNCA} RON</b></div>
          <div class="ws-item">Ore lucrate: <b>${wO} h</b></div>
          <div class="ws-item green">Net săpt: <b>${fmt(wN)} RON</b></div>
        </div>
      </div>
      ${wD.map(d=>{
        const{comenzi,bonusuri,total}=calcDay(d);
        const f=FIRMS[d.firma||'glovo'];
        return`<div class="day-card" style="border-left:3px solid ${f.color}40">
          <div class="day-hdr">
            <div>
              <div class="day-title">${dayLabel(d.data)}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                ${firmBadgeHtml(d.firma||'glovo')}
                ${d.ore?`<span style="font-size:10px;color:#333">${d.ore}h</span>`:''}
                ${d.cu_sef?`<span style="font-size:10px;color:#f87171;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);padding:2px 6px;border-radius:4px;">−10% șef</span>`:''}

            <div class="sb"><div class="sl">Bonusuri</div><div class="sv">${fmt(bonusuri)} RON</div></div>
            <div class="sb o"><div class="sl">Ore lucrate</div><div class="sv orange">${d.ore||'—'}</div></div>
            <div class="sb g"><div class="sl">Total zi</div><div class="sv green">${fmt(total)} RON</div></div>
          </div>
          ${d.nota?`<div class="day-note">${d.nota}</div>`:''}
        </div>`;
      }).join('')}`;
  }
  return'';
}

          <div style="background:rgba(14,165,233,.05);border-radius:7px;padding:8px 10px;"><div class="sl">Cost real</div><div class="sv" style="color:#0ea5e9">${fmt(mNet)} RON</div></div>

              <div style="display:flex;gap:5px;">
                <button style="background:#161616;border:1px solid #1e1e1e;border-radius:6px;color:#3a3a3a;padding:4px 8px;font-size:11px;cursor:pointer;" onclick="editFuel(${f.id})">✏️</button>
                <button style="background:#161616;border:1px solid #1e1e1e;border-radius:6px;color:#3a3a3a;padding:4px 8px;font-size:11px;cursor:pointer;" onclick="askDelete('fuel',${f.id},'Ștergi bonul din ${f.data}?')">🗑️</button>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
              <div style="background:#0d0d0d;border-radius:7px;padding:7px 9px;"><div class="sl">Total bon</div><div class="sv">${fmt(fc.total)} RON</div></div>
              ${fc.pe_firma?`<div style="background:rgba(14,165,233,.05);border-radius:7px;padding:7px 9px;"><div class="sl">Decontare 5%</div><div class="sv" style="color:#0ea5e9">-${fmt(fc.decontare)} RON</div></div>`:'<div style="background:#0d0d0d;border-radius:7px;padding:7px 9px;"><div class="sl">Tip</div><div class="sv" style="color:#555">Personal</div></div>'}
              <div style="background:rgba(14,165,233,.05);border-radius:7px;padding:7px 9px;grid-column:span 2;"><div class="sl">Cost real</div><div class="sv" style="color:#0ea5e9;font-size:15px;">${fmt(fc.net)} RON</div></div>
            </div>
            ${f.nota?`<div class="day-note" style="margin-top:9px;">${f.nota}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleFuelMonth(mk){
  const body=document.getElementById('fmbody-'+mk),chev=document.getElementById('fchev-'+mk);
  if(!body)return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(chev)chev.style.transform=open?'':'rotate(180deg)';
}

function submitFuel(){
  const data=document.getElementById('ff-data').value;
  const litri=document.getElementById('ff-litri').value;
  const pret_litru=document.getElementById('ff-pret').value;
  const nota=document.getElementById('ff-nota').value;
  const pe_firma=getFuelFirma();
  if(!litri||!pret_litru)return;
  if(editFuelId!==null){fuels=fuels.map(f=>f.id===editFuelId?{id:editFuelId,data,litri,pret_litru,nota,pe_firma}:f);editFuelId=null;}
  else fuels.push({id:Date.now(),data,litri,pret_litru,nota,pe_firma});
  saveFuels();
  renderFuel();
  const t=document.getElementById('fuel-toast');
  if(t){t.textContent='Bon salvat!';t.style.background='#0c2d3d';t.style.color='#7dd3fc';t.style.display='block';setTimeout(()=>t.style.display='none',2000);}
}
function cancelEditFuel(){editFuelId=null;renderFuel();}
function editFuel(id){editFuelId=id;renderFuel();}

// ── SERVICE ──────────────────────────────────────────────────
function renderService(){
  const c=document.getElementById('main-content');
  const editing=editSrvId!==null;
  const es=editing?serviceRecs.find(x=>x.id===editSrvId):null;
  if(editing&&es)srvItems=es.items.map(i=>({...i}));
  else if(!editing)srvItems=[{name:'',pret:''}];

  c.innerHTML=`
    <div class="card">
      <div class="card-title">${editing?'Editează bon service':'Adaugă bon service'}</div>
      <div class="field"><label>Data</label><input type="date" id="sv-data"/></div>
      <div class="field"><label>Notițe (atelier, mașină etc)</label><textarea id="sv-nota" placeholder="Ex: Vulcanizare Ionescu, Dacia Logan..."></textarea></div>
      <div class="field">
        <label>Produse / servicii</label>
        <div id="srv-items-list"></div>
        <button class="btn btn-gh btn-sm" style="margin-top:6px;width:auto;padding:8px 16px;" onclick="addSrvItem()">+ Adaugă produs</button>
      </div>
      <div id="srv-preview"></div>
      <button class="btn btn-gr" id="srv-btn" onclick="submitService()"></button>
      <div id="srv-toast" style="display:none" class="toast"></div>
      ${editing?`<button class="btn btn-gh" onclick="cancelEditSrv()">Anulează editarea</button>`:''}
    </div>
    <div id="srv-list"></div>`;

  document.getElementById('srv-btn').textContent=editing?'Salvează modificările':'Salvează bon';
  if(editing&&es){
    document.getElementById('sv-data').value=es.data||today();
    document.getElementById('sv-nota').value=es.nota||'';
  } else {
    document.getElementById('sv-data').value=today();
  }
  renderSrvItems();
  renderSrvList();
}

function renderSrvItems(){
  const container=document.getElementById('srv-items-list');
  if(!container)return;
  container.innerHTML=srvItems.map((item,i)=>`
    <div class="service-item-row">
      <input type="text" placeholder="Produs / serviciu" value="${item.name||''}" oninput="updateSrvItem(${i},'name',this.value)" style="flex:2"/>
      <input type="number" placeholder="RON" value="${item.pret||''}" oninput="updateSrvItem(${i},'pret',this.value)" min="0" step="0.01" style="flex:1"/>
      ${srvItems.length>1?`<button class="del-item-btn" onclick="removeSrvItem(${i})">×</button>`:''}
    </div>`).join('');
  updateSrvPreview();
}
function updateSrvItem(i,field,val){srvItems[i][field]=val;updateSrvPreview();}
function addSrvItem(){srvItems.push({name:'',pret:''});renderSrvItems();}
function removeSrvItem(i){srvItems.splice(i,1);renderSrvItems();}
function updateSrvPreview(){
  const total=srvItems.reduce((a,i)=>a+(parseFloat(i.pret)||0),0);
  const el=document.getElementById('srv-preview');if(!el)return;
  el.innerHTML=total>0?`<div class="preview">
    <div class="pr"><span>Produse (${srvItems.filter(i=>i.name||i.pret).length})</span><span>${fmt(total)} RON</span></div>
    <div class="pr hl"><span>Total bon service</span><span style="color:#f87171">-${fmt(total)} RON</span></div>
  </div>`:'';
}
function submitService(){
  const data=document.getElementById('sv-data').value;
  const nota=document.getElementById('sv-nota').value;
  const items=srvItems.filter(i=>i.name||i.pret);
  if(items.length===0)return;
  if(editSrvId!==null){serviceRecs=serviceRecs.map(s=>s.id===editSrvId?{id:editSrvId,data,nota,items}:s);editSrvId=null;}
  else serviceRecs.push({id:Date.now(),data,nota,items});
  saveSrv();
  srvItems=[{name:'',pret:''}];
  renderService();
  const t=document.getElementById('srv-toast');
  if(t){t.textContent='Bon service salvat!';t.style.background='#0f2e18';t.style.color='#4ade80';t.style.display='block';setTimeout(()=>t.style.display='none',2000);}
}
function cancelEditSrv(){editSrvId=null;srvItems=[{name:'',pret:''}];renderService();}
function editSrv(id){editSrvId=id;renderService();}

function renderSrvList(){
  const el=document.getElementById('srv-list');if(!el)return;
  if(serviceRecs.length===0){el.innerHTML=`<div class="empty"><span class="empty-icon">🔧</span>Niciun bon service salvat.</div>`;return;}
  const sm=getSrvMonths();
  el.innerHTML=Object.keys(sm).sort().reverse().map(mk=>{
    const mS=sm[mk];
    const mTotal=mS.reduce((a,s)=>a+calcSrv(s),0);
    return`<div style="margin-bottom:9px;">
      <div class="month-row" style="border-radius:10px 10px 0 0;margin-bottom:0;" onclick="toggleSrvMonth('${mk}')">
        <div>
          <div class="month-row-name" style="color:#f87171">${monthLabel(mk)}</div>
          <div class="month-row-sub">${mS.length} bonuri · total ${fmt(mTotal)} RON</div>
        </div>
        <span id="svchev-${mk}" style="color:#2a2a2a;font-size:11px;display:inline-block;transition:transform .2s">▼</span>
      </div>
      <div id="svbody-${mk}" style="display:none;background:#0a0a0a;border:1px solid #1a1a1a;border-top:none;border-radius:0 0 10px 10px;padding:11px 13px;">
        ${mS.slice().sort((a,b)=>b.data.localeCompare(a.data)).map(s=>{
          const tot=calcSrv(s);
          return`<div class="service-record">
            <div class="srv-hdr">
              <div>
                <div class="srv-title">${s.data}</div>
                ${s.nota?`<div class="srv-sub">${s.nota}</div>`:''}
              </div>
              <div style="display:flex;gap:5px;align-items:center;">
                <span style="font-size:14px;font-weight:700;color:#f87171">-${fmt(tot)} RON</span>
                <button class="ic" onclick="editSrv(${s.id})">✏️</button>
                <button class="ic red" onclick="askDelete('srv',${s.id},'Ștergi bonul service?')">🗑️</button>
              </div>
            </div>
            <div class="srv-items">
              ${(s.items||[]).map(i=>`<div class="srv-item"><span>${i.name||'—'}</span><span>${fmt(parseFloat(i.pret)||0)} RON</span></div>`).join('')}
            </div>
            <div class="srv-total"><span>Total bon</span><span>${fmt(tot)} RON</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
function toggleSrvMonth(mk){
  const body=document.getElementById('svbody-'+mk),chev=document.getElementById('svchev-'+mk);
  if(!body)return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(chev)chev.style.transform=open?'':'rotate(180deg)';
}

// ── STATS ──────────────────────────────────────────────────────
function renderStats(){
  if(days.length===0&&fuels.length===0&&serviceRecs.length===0)
    return`<div class="empty"><span class="empty-icon">📊</span>Nu există date încă.</div>`;

  const grouped=groupDays();
  const weekSet=new Set(days.map(d=>getWeekKey(d.data)));
  const totalBrut=days.reduce((a,d)=>a+calcDay(d).total,0);
  const totalCM=weekSet.size*CARTE_MUNCA;
  // compute sef and net at week level
  const grouped2=groupDays();
  let totalSef=0,totalNet=0;
  Object.values(grouped2).forEach(mW=>Object.values(mW).forEach(wD=>{const w=calcWeek(wD);totalSef+=w.sef;totalNet+=w.net;}));

  const totalFuelNet=fuels.reduce((a,f)=>a+calcFuel(f).net,0);
  const totalFuelDec=fuels.reduce((a,f)=>a+calcFuel(f).decontare,0);
  const totalSrv=serviceRecs.reduce((a,s)=>a+calcSrv(s),0);
  const profitNet=totalNet-totalFuelNet-totalSrv;
  const totalOre=days.reduce((a,d)=>a+(parseFloat(d.ore)||0),0);
  const medieOra=totalOre>0?profitNet/totalOre:0;

  const fm=getFuelMonths();
  const sm=getSrvMonths();
  const allMK=[...new Set([...Object.keys(grouped),...Object.keys(fm),...Object.keys(sm)])].sort().reverse();

  // chart
  const chartMK=allMK.slice(0,6).reverse();
  const chartData=chartMK.map(mk=>{
    const mW=grouped[mk]||{};
    const mDays=Object.values(mW).flat();
    const brut=mDays.reduce((a,d)=>a+calcDay(d).total,0);
    const net=Object.values(mW).reduce((a,wD)=>a+calcWeek(wD).net,0);
    const fNet=(fm[mk]||[]).reduce((a,f)=>a+calcFuel(f).net,0);
    const sNet=(sm[mk]||[]).reduce((a,s)=>a+calcSrv(s),0);
    return{mk,profit:net-fNet-sNet};
  });
  const maxVal=Math.max(...chartData.map(d=>Math.abs(d.profit)),1);

  const chartHtml=`<div class="chart-wrap">
    <div class="chart-title">Profit net lunar (ultimele ${chartMK.length} luni)</div>
    <div class="bar-chart">
      ${chartData.map(d=>{
        const pct=Math.abs(d.profit)/maxVal*100;
        const col=d.profit>=0?'#4ade80':'#f87171';
        const[,mm]=d.mk.split('-');
        const mName=new Date(2000,+mm-1,1).toLocaleDateString('ro-RO',{month:'short'});
        return`<div class="bar-col">
          <div class="bar-val" style="color:${col}">${fmtInt(Math.round(d.profit))}</div>
          <div class="bar" style="height:${pct}%;background:${col};opacity:.8;margin-top:auto;"></div>
          <div class="bar-lbl">${mName}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // firm breakdown
  const firmTotals={glovo:0,wolt:0,bolt:0};
  days.forEach(d=>{const fk=d.firma||'glovo';firmTotals[fk]+=(calcDay(d).total||0);});
  const firmHtml=Object.entries(firmTotals).filter(([,v])=>v>0).map(([k,v])=>{
    const f=FIRMS[k];
    return`<div class="sc-item" style="background:${f.bg};border:1px solid ${f.border}">
      <div class="sc-il" style="display:flex;align-items:center;gap:4px">${LOGO_SM[k]} <span style="color:${f.color}">${f.name}</span></div>
      <div class="sc-iv" style="color:${f.color}">${fmtInt(Math.round(v))} RON</div>
    </div>`;
  }).join('');

  return`
    ${chartHtml}
    <div class="profit-card ${profitNet>=0?'g':'r'}">
      <div class="pc-lbl">PROFIT NET FINAL</div>
      <div class="pc-val ${profitNet>=0?'g':'r'}">${fmtInt(Math.round(profitNet))} <span style="font-size:18px;color:#3a3a3a;font-weight:400">RON</span></div>
      <div class="pc-sub">Bani curați rămași în buzunar<br>Medie ${fmt(medieOra)} RON/oră</div>
    </div>

    <div class="sum-card">
      <div class="sc-lbl">Incasări brut total</div>
      <div class="sc-val">${fmtInt(Math.round(totalBrut))} <span>RON</span></div>
      <div class="sc-grid">
        <div class="sc-item"><div class="sc-il">Carte muncă total</div><div class="sc-iv" style="color:#e87e00">-${fmtInt(totalCM)} RON</div></div>
        ${totalSef>0?`<div class="sc-item"><div class="sc-il">Șef 10% total</div><div class="sc-iv" style="color:#f87171">-${fmtInt(Math.round(totalSef))} RON</div></div>`:''}
        <div class="sc-item"><div class="sc-il">Net după deduceri</div><div class="sc-iv" style="color:#4ade80">${fmtInt(Math.round(totalNet))} RON</div></div>
        <div class="sc-item"><div class="sc-il">Zile lucrate</div><div class="sc-iv">${days.length}</div></div>
        <div class="sc-item"><div class="sc-il">Total ore</div><div class="sc-iv">${totalOre} h</div></div>
        <div class="sc-item"><div class="sc-il">Săptămâni</div><div class="sc-iv">${weekSet.size}</div></div>
      </div>
    </div>

    ${firmHtml?`<div class="sum-card">
      <div class="sc-lbl">Net pe firmă</div>
      <div class="sc-grid">${firmHtml}</div>
    </div>`:''}

    ${fuels.length>0?`<div class="sum-card">
      <div class="sc-lbl">Cheltuieli carburant</div>
      <div class="sc-val b">${fmtInt(Math.round(totalFuelNet))} <span>RON</span></div>
      <div class="sc-grid">
        <div class="sc-item"><div class="sc-il">Bonuri</div><div class="sc-iv">${fuels.length}</div></div>
        <div class="sc-item"><div class="sc-il">Litri total</div><div class="sc-iv">${fmt(fuels.reduce((a,f)=>a+(parseFloat(f.litri)||0),0),1)} L</div></div>
        <div class="sc-item"><div class="sc-il">Decontat firmă</div><div class="sc-iv" style="color:#0ea5e9">-${fmtInt(Math.round(totalFuelDec))} RON</div></div>
        <div class="sc-item"><div class="sc-il">Cost net</div><div class="sc-iv">${fmtInt(Math.round(totalFuelNet))} RON</div></div>
      </div>
    </div>`:''}

    ${serviceRecs.length>0?`<div class="sum-card">
      <div class="sc-lbl">Cheltuieli service</div>
      <div class="sc-val r">${fmtInt(Math.round(totalSrv))} <span>RON</span></div>
      <div class="sc-grid">
        <div class="sc-item"><div class="sc-il">Bonuri service</div><div class="sc-iv">${serviceRecs.length}</div></div>
        <div class="sc-item"><div class="sc-il">Produse total</div><div class="sc-iv">${serviceRecs.reduce((a,s)=>a+(s.items||[]).length,0)}</div></div>
      </div>
    </div>`:''}

    <div class="sec-title">Detalii pe luni</div>
    ${allMK.map(mk=>{
      const mW=grouped[mk]||{};
      const mF=fm[mk]||[];
      const mS=sm[mk]||[];
      const mD=Object.values(mW).flat();
      const brut=mD.reduce((a,d)=>a+calcDay(d).total,0);
      const cm=Object.keys(mW).length*CARTE_MUNCA;
      const sef=Object.values(mW).reduce((a,wD)=>a+calcWeek(wD).sef,0);
      const salNet=Object.values(mW).reduce((a,wD)=>a+calcWeek(wD).net,0);
      const fNet=mF.reduce((a,f)=>a+calcFuel(f).net,0);
      const sNet=mS.reduce((a,s)=>a+calcSrv(s),0);
      const mp=salNet-fNet-sNet;
      const dom=mD.length>0?dominantFirm(mD):'glovo';
      const fc=FIRMS[dom];
      return`<div class="sum-card" style="background:${mp>=0?'#0a160d':'#160a0a'};border:1px solid ${mp>=0?'rgba(74,222,128,.1)':'rgba(248,113,113,.1)'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;">
          <div>
            <div style="font-size:14px;font-weight:600;color:#666;display:flex;align-items:center;gap:6px;text-transform:capitalize">
              ${mD.length>0?LOGO_SM[dom]:''}${monthLabel(mk)}
            </div>
            <div style="font-size:11px;color:#2a2a2a;margin-top:2px">${mD.length} zile · ${Object.keys(mW).length} săpt</div>
          </div>
          <div style="font-size:21px;font-weight:700;color:${mp>=0?'#4ade80':'#f87171'}">${fmtInt(Math.round(mp))} RON</div>
        </div>
        <div class="sc-grid">
          ${mD.length>0?`<div class="sc-item"><div class="sc-il">Brut</div><div class="sc-iv">${fmtInt(Math.round(brut))} RON</div></div>`:''}
          ${sef>0?`<div class="sc-item"><div class="sc-il">Șef 10%</div><div class="sc-iv" style="color:#f87171">-${fmtInt(Math.round(sef))} RON</div></div>`:''}
          ${mD.length>0?`<div class="sc-item"><div class="sc-il">Carte muncă</div><div class="sc-iv" style="color:#e87e00">-${cm} RON</div></div>`:''}
          ${mD.length>0?`<div class="sc-item"><div class="sc-il">Sal net</div><div class="sc-iv" style="color:#4ade80">${fmtInt(Math.round(salNet))} RON</div></div>`:''}
          ${mF.length>0?`<div class="sc-item"><div class="sc-il">Carburant</div><div class="sc-iv" style="color:#0ea5e9">-${fmtInt(Math.round(fNet))} RON</div></div>`:''}
          ${mS.length>0?`<div class="sc-item"><div class="sc-il">Service</div><div class="sc-iv" style="color:#f87171">-${fmtInt(Math.round(sNet))} RON</div></div>`:''}
        </div>
      </div>`;
    }).join('')}`;
}

// ── DELETE ────────────────────────────────────────────────────
function askDelete(type,id,msg){
  pendingDelete={type,id};
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-modal').style.display='flex';
}
function cancelDelete(){pendingDelete=null;document.getElementById('confirm-modal').style.display='none';}
function doDelete(){
  if(!pendingDelete)return;
  if(pendingDelete.type==='day'){days=days.filter(d=>d.id!==pendingDelete.id);saveDays();}
  else if(pendingDelete.type==='fuel'){fuels=fuels.filter(f=>f.id!==pendingDelete.id);saveFuels();}
  else if(pendingDelete.type==='srv'){serviceRecs=serviceRecs.filter(s=>s.id!==pendingDelete.id);saveSrv();}
  cancelDelete();
  render();
}

loadData();
</script>
</body>
</html>
